<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#121627"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8956a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a0e17" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="400" cy="250" r="200" fill="url(#glow)"/>
  <!-- Network graph / NLP connections -->
  <g opacity="0.9">
    <!-- Nodes -->
    <circle cx="400" cy="200" r="18" fill="#7a352b" stroke="#e8956a" stroke-width="2"/>
    <circle cx="280" cy="160" r="14" fill="#7a352b" stroke="#e8956a" stroke-width="1.5"/>
    <circle cx="520" cy="160" r="14" fill="#7a352b" stroke="#e8956a" stroke-width="1.5"/>
    <circle cx="320" cy="290" r="12" fill="#7a352b" stroke="#f0a878" stroke-width="1.5"/>
    <circle cx="480" cy="290" r="12" fill="#7a352b" stroke="#f0a878" stroke-width="1.5"/>
    <circle cx="220" cy="250" r="10" fill="#7a352b" stroke="#e8956a" stroke-width="1"/>
    <circle cx="580" cy="250" r="10" fill="#7a352b" stroke="#e8956a" stroke-width="1"/>
    <circle cx="360" cy="350" r="10" fill="#7a352b" stroke="#f0a878" stroke-width="1"/>
    <circle cx="440" cy="350" r="10" fill="#7a352b" stroke="#f0a878" stroke-width="1"/>
    <circle cx="200" cy="330" r="8" fill="#7a352b" stroke="#e8956a" stroke-width="1" opacity="0.6"/>
    <circle cx="600" cy="330" r="8" fill="#7a352b" stroke="#e8956a" stroke-width="1" opacity="0.6"/>
    <!-- Connections -->
    <line x1="400" y1="200" x2="280" y2="160" stroke="#e8956a" stroke-width="1.5" opacity="0.5"/>
    <line x1="400" y1="200" x2="520" y2="160" stroke="#e8956a" stroke-width="1.5" opacity="0.5"/>
    <line x1="400" y1="200" x2="320" y2="290" stroke="#f0a878" stroke-width="1" opacity="0.4"/>
    <line x1="400" y1="200" x2="480" y2="290" stroke="#f0a878" stroke-width="1" opacity="0.4"/>
    <line x1="280" y1="160" x2="220" y2="250" stroke="#e8956a" stroke-width="1" opacity="0.3"/>
    <line x1="520" y1="160" x2="580" y2="250" stroke="#e8956a" stroke-width="1" opacity="0.3"/>
    <line x1="320" y1="290" x2="360" y2="350" stroke="#f0a878" stroke-width="1" opacity="0.3"/>
    <line x1="480" y1="290" x2="440" y2="350" stroke="#f0a878" stroke-width="1" opacity="0.3"/>
    <line x1="220" y1="250" x2="200" y2="330" stroke="#e8956a" stroke-width="0.8" opacity="0.2"/>
    <line x1="580" y1="250" x2="600" y2="330" stroke="#e8956a" stroke-width="0.8" opacity="0.2"/>
    <line x1="280" y1="160" x2="320" y2="290" stroke="#e8956a" stroke-width="0.8" opacity="0.25"/>
    <line x1="520" y1="160" x2="480" y2="290" stroke="#e8956a" stroke-width="0.8" opacity="0.25"/>
    <line x1="360" y1="350" x2="440" y2="350" stroke="#f0a878" stroke-width="0.8" opacity="0.3"/>
  </g>
  <!-- Node labels -->
  <text x="400" y="205" text-anchor="middle" fill="#f5c4a0" font-family="sans-serif" font-size="11" font-weight="600">NLP</text>
  <text x="280" y="164" text-anchor="middle" fill="#f0a878" font-family="sans-serif" font-size="9">BLEU</text>
  <text x="520" y="164" text-anchor="middle" fill="#f0a878" font-family="sans-serif" font-size="9">Fuzzy</text>
  <!-- Data flow dots -->
  <circle cx="340" cy="180" r="2" fill="#e8956a" opacity="0.7"/>
  <circle cx="460" cy="180" r="2" fill="#e8956a" opacity="0.7"/>
  <circle cx="360" cy="245" r="2" fill="#f0a878" opacity="0.5"/>
  <circle cx="440" cy="245" r="2" fill="#f0a878" opacity="0.5"/>
  <text x="400" y="440" text-anchor="middle" fill="#e8956a" font-family="sans-serif" font-size="18" font-weight="600" letter-spacing="4" opacity="0.7">GENWORTH NLP ENGINE</text>
</svg>
