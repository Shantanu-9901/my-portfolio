<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#1a121d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b86341" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0e17" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="400" cy="250" r="180" fill="url(#glow)"/>
  <!-- Quadruped robot legs -->
  <g transform="translate(400,250)" stroke="#e8956a" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Body -->
    <rect x="-70" y="-40" width="140" height="50" rx="8" stroke="#e8956a" stroke-width="2.5"/>
    <!-- Head -->
    <rect x="60" y="-55" width="45" height="35" rx="6" stroke="#f0a878" stroke-width="2"/>
    <circle cx="90" cy="-40" r="4" fill="#e8956a"/>
    <!-- Front left leg -->
    <line x1="-50" y1="10" x2="-60" y2="50" stroke-width="3"/>
    <line x1="-60" y1="50" x2="-45" y2="80" stroke-width="3"/>
    <!-- Front right leg -->
    <line x1="-20" y1="10" x2="-10" y2="55" stroke-width="3"/>
    <line x1="-10" y1="55" x2="-25" y2="80" stroke-width="3"/>
    <!-- Rear left leg -->
    <line x1="20" y1="10" x2="10" y2="55" stroke-width="3"/>
    <line x1="10" y1="55" x2="25" y2="80" stroke-width="3"/>
    <!-- Rear right leg -->
    <line x1="50" y1="10" x2="60" y2="50" stroke-width="3"/>
    <line x1="60" y1="50" x2="45" y2="80" stroke-width="3"/>
  </g>
  <!-- Shield / defense icon -->
  <g transform="translate(250,140)" opacity="0.5">
    <path d="M0,-30 L25,0 L0,35 L-25,0 Z" fill="none" stroke="#f0a878" stroke-width="2"/>
    <line x1="0" y1="-15" x2="0" y2="20" stroke="#f0a878" stroke-width="1.5"/>
    <line x1="-12" y1="2" x2="12" y2="2" stroke="#f0a878" stroke-width="1.5"/>
  </g>
  <!-- Target reticle -->
  <g transform="translate(550,150)" opacity="0.4">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#e8956a" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#e8956a" stroke-width="1"/>
    <line x1="0" y1="-28" x2="0" y2="-14" stroke="#e8956a" stroke-width="1.5"/>
    <line x1="0" y1="14" x2="0" y2="28" stroke="#e8956a" stroke-width="1.5"/>
    <line x1="-28" y1="0" x2="-14" y2="0" stroke="#e8956a" stroke-width="1.5"/>
    <line x1="14" y1="0" x2="28" y2="0" stroke="#e8956a" stroke-width="1.5"/>
  </g>
  <!-- Grid floor -->
  <g opacity="0.15" stroke="#e8956a" stroke-width="0.5">
    <line x1="100" y1="400" x2="700" y2="400"/>
    <line x1="150" y1="420" x2="650" y2="420"/>
    <line x1="200" y1="440" x2="600" y2="440"/>
    <line x1="200" y1="380" x2="200" y2="440"/>
    <line x1="300" y1="380" x2="300" y2="440"/>
    <line x1="400" y1="380" x2="400" y2="440"/>
    <line x1="500" y1="380" x2="500" y2="440"/>
    <line x1="600" y1="380" x2="600" y2="440"/>
  </g>
  <text x="400" y="460" text-anchor="middle" fill="#e8956a" font-family="sans-serif" font-size="18" font-weight="600" letter-spacing="4" opacity="0.7">GUARDIO — DEFENSE ROBOT</text>
</svg>
